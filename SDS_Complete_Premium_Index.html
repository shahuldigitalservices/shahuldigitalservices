<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahul Digital Services (SDS)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:#fff}
header{padding:70px 20px;text-align:center;background:linear-gradient(135deg,#0ea5e9,#1d4ed8)}
.btn{display:inline-block;padding:12px 20px;border-radius:25px;color:#fff;text-decoration:none;margin:5px}
.wa{background:#25D366}.tg{background:#229ED9}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.card{background:#16233d;padding:20px;border-radius:15px;cursor:pointer;text-align:center}
.card i{font-size:32px;color:#38bdf8}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center}
.box{background:#16233d;padding:20px;border-radius:15px;max-width:500px;width:90%}
.close{float:right;cursor:pointer}
</style>
</head>
<body>
<header>
<h1>Shahul Digital Services</h1>
<p>Digital Assistance • EPFO • Passport • PAN • Aadhaar</p>
<a class="btn wa" href="https://wa.me/message/TWGZ6CA2QMPOF1">WhatsApp</a>
<a class="btn tg" href="https://t.me/+JNMsFlLFF9gxNjE1">Telegram</a>
</header>

<div class="container">
<div class="grid">
<div class="card" onclick="openService('epfo')"><i class="fas fa-building-columns"></i><h3>EPFO</h3></div>
<div class="card" onclick="openService('passport')"><i class="fas fa-passport"></i><h3>Passport</h3></div>
<div class="card" onclick="openService('pan')"><i class="fas fa-id-card"></i><h3>PAN Card</h3></div>
<div class="card" onclick="openService('aadhaar')"><i class="fas fa-address-card"></i><h3>Aadhaar</h3></div>
<div class="card" onclick="openService('banking')"><i class="fas fa-university"></i><h3>Banking</h3></div>
<div class="card" onclick="openService('visa')"><i class="fas fa-plane"></i><h3>Visa</h3></div>
</div>
</div>

<div class="modal" id="modal">
<div class="box">
<span class="close" onclick="closeModal()">✖</span>
<h2 id="title"></h2>
<div id="content"></div>
</div>
</div>

<script>
const services={
epfo:{title:"EPFO Services",about:"PF Advance Claim, Final Settlement, KYC Update, UAN Activation",info:"Advance Claim usually 1-20 days. Final Settlement usually 10-30 days.",required:"UAN Number, EPFO Password, OTP"},
passport:{title:"Passport Services",about:"Fresh Passport, Renewal, PCC, Minor Passport",info:"Normal and Tatkal passport fees apply as per Passport Seva rules.",required:"Aadhaar, PAN, Mobile, Email"},
pan:{title:"PAN Card Services",about:"New PAN, Correction, Reprint, e-PAN",info:"Processed through authorized government systems.",required:"Aadhaar and Mobile Number"},
aadhaar:{title:"Aadhaar Services",about:"Address, Name, DOB correction guidance",info:"Some services require Aadhaar center visit.",required:"Aadhaar and supporting documents"},
banking:{title:"Banking Services",about:"NRE, NRO, BSBDA, Net Banking",info:"Requirements vary by bank.",required:"ID proof and account details"},
visa:{title:"Visa Services",about:"Saudi Visa, Visit Visa, eVisa Guidance",info:"Processing depends on visa category.",required:"Passport and supporting documents"}
};
function openService(k){
let s=services[k];
document.getElementById('title').innerText=s.title;
document.getElementById('content').innerHTML='<h3>About</h3><p>'+s.about+'</p><h3>Information</h3><p>'+s.info+'</p><h3>Required</h3><p>'+s.required+'</p><br><a class="btn wa" href="https://wa.me/message/TWGZ6CA2QMPOF1">Contact on WhatsApp</a>';
document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}
</script>
</body>
</html>
