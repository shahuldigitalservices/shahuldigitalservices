<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDS - Shahul Digital Services</title>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:linear-gradient(135deg,#0ea5e9,#2563eb);
padding:60px 20px;
text-align:center;
}

header h1{
font-size:36px;
margin-bottom:10px;
}

header p{
font-size:18px;
}

.btn{
display:inline-block;
padding:12px 25px;
margin:10px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
color:white;
}

.whatsapp{
background:#25D366;
}

.telegram{
background:#229ED9;
}

.services{
padding:40px 20px;
}

.services h2{
text-align:center;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:#1e293b;
}

.card i{
font-size:35px;
margin-bottom:10px;
color:#38bdf8;
}

.contact{
padding:40px 20px;
text-align:center;
}

.contact p{
margin:10px;
}

.footer{
background:#020617;
padding:15px;
text-align:center;
}

width:55px;
